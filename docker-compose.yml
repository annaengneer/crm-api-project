services:
  db:
    image: postgres:15
    container_name: crm-api-db
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm_api_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
